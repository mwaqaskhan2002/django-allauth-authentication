{% extends 'base.html' %}

{% block title %} Authentication Error {% endblock %}

{% block content %}
<main class="page-center d-flex justify-content-center align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-xl-4">
                <div class="card shadow p-4">
                    <div class="invalid-icon text-center">
                        <i class="bi bi-exclamation-triangle-fill text-danger"></i>
                    </div>
                    <h2 class="text-center my-4">Authentication Error</h2>
                    <p class="card-text text-center">
                        An error occurred while trying to login with your 
                        social account. Please try again.
                    </p>

                    {% if exception %}
                        <div class="alert alert-danger py-2 small">
                            {{ exception }}
                        </div>
                    {% endif %}

                    <a href="{% url 'account_login' %}" 
                       class="btn btn-primary col-12 mb-2">
                        Try Again
                    </a>
                    <hr>
                    <div class="text-center">
                        <small>
                            <a href="{% url 'account_login' %}">
                                Back to Login
                            </a>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
